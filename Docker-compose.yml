services:
  db:
    image: postgres:16
    container_name: urban_data_explorer_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: urban_data_explorer_pgadmin
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  mongo:
    image: mongo:7
    container_name: urban_data_explorer_mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo_express:
    image: mongo-express:1.0.2
    container_name: urban_data_explorer_mongo_express
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD}
    ports:
      - "8081:8081"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urban_data_explorer_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DATA_DIR: /data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  # ──────────────────────────────────────────────────────────────
  # Redis : Message broker pour Airflow + Celery
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: urban_data_explorer_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # ──────────────────────────────────────────────────────────────
  # Airflow Webserver : Interface de monitoring (port 8080)
  # ──────────────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    container_name: urban_data_explorer_airflow_webserver
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}_airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}_airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      AIRFLOW_HOME: /app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./dags:/app/dags
      - ./logs:/app/logs
      - .:/app
    command: >
      sh -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null || true &&
      airflow webserver --port 8080
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Airflow Scheduler : Exécution des DAGs selon le schedule
  # ──────────────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    container_name: urban_data_explorer_airflow_scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}_airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}_airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "False"
      AIRFLOW_HOME: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./dags:/app/dags
      - ./logs:/app/logs
      - .:/app
    command: airflow scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "urban_data_explorer_airflow_scheduler"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Airflow Worker : Exécution parallèle des tasks (Celery)
  # ──────────────────────────────────────────────────────────────
  airflow-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: airflow
    container_name: urban_data_explorer_airflow_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}_airflow
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__CORE__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__RESULT_BACKEND: db+postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}_airflow
      AIRFLOW__CORE__DAGS_FOLDER: /app/dags
      AIRFLOW_HOME: /app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./dags:/app/dags
      - ./logs:/app/logs
      - .:/app
    command: airflow celery worker
    healthcheck:
      test: ["CMD", "celery", "-A", "airflow.executors.celery_executor.app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pg_data:
  pgadmin_data:
  mongo_data:
  redis_data:
